name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/Leaderboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/Leaderboard/package-lock.json
      - run: npm ci
      - run: npm run check
        env:
          VITE_API_URL: http://localhost:5000

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/eliteboards-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/eliteboards-mobile/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run check-config
        env:
          EXPO_PUBLIC_API_URL: https://example.com
      - run: npm run doctor
        env:
          EXPO_PUBLIC_API_URL: https://example.com
